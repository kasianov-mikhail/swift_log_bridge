name: swift_log_bridge
description: Flutter bridge to Apple's swift-log. Provides structured logging via platform channels to iOS swift-log Logger instances.
version: 0.1.0
repository: https://github.com/kasianov-mikhail/swift_log_bridge
topics:
  - logging
  - swift-log
  - ios

environment:
  sdk: ^3.11.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.kasianov.swift_log_bridge
        pluginClass: SwiftLogBridgePlugin
      ios:
        pluginClass: SwiftLogBridgePlugin
